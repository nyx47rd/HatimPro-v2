    <script>
      // CRITICAL: Robust Chunk Error & Black Screen Detection
      (function() {
        var lastReload = sessionStorage.getItem('last_recovery_reload');
        var now = Date.now();
        var isRecentReload = lastReload && (now - parseInt(lastReload)) < 30000;

        function reload() {
          if (!isRecentReload) {
            sessionStorage.setItem('last_recovery_reload', Date.now().toString());
            window.location.reload(true); // Force reload
          }
        }

        // 1. Catch Chunk Loading Errors
        window.addEventListener('error', function(e) {
          var msg = (e.message || '').toLowerCase();
          if (msg.indexOf('chunk') > -1 || msg.indexOf('loading') > -1 || msg.indexOf('script error') > -1) {
            reload();
          }
        }, true);

        // 2. Catch Unhandled Rejections
        window.addEventListener('unhandledrejection', function(e) {
          var msg = (e.reason && e.reason.message || '').toLowerCase();
          if (msg.indexOf('chunk') > -1) {
            reload();
          }
        });

        // 3. Black Screen Detection
        var checkCount = 0;
        var checkInterval = setInterval(function() {
          checkCount++;
          var root = document.getElementById('root');
          // If root is empty or contains only a spinner for too long
          var isEmpty = !root || root.innerHTML.trim() === '';
          var isStuckLoading = root && root.innerHTML.indexOf('animate-spin') > -1;

          if (isEmpty || isStuckLoading) {
            if (checkCount >= 10) { // After 5 seconds (500ms * 10)
              clearInterval(checkInterval);
              console.error('Black screen or stuck loading detected, reloading...');
              reload();
            }
          } else {
            // App mounted successfully
            clearInterval(checkInterval);
            console.log('App mounted successfully');
          }
        }, 500);

        // 4. Force a reload if we are still on a black screen after 15 seconds no matter what
        setTimeout(function() {
          var root = document.getElementById('root');
          if (!root || root.innerHTML.trim() === '' || root.innerHTML.indexOf('animate-spin') > -1) {
             console.error('Still black after 15s, final attempt reload...');
             reload();
          }
        }, 15000);
      })();
    </script>
